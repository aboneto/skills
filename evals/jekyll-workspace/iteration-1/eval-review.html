<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jekyll Skill Eval Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { color: #e94560; margin-bottom: 20px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; background: #16213e; border: none; color: #aaa; cursor: pointer; border-radius: 6px; }
    .tab.active { background: #e94560; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .eval-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .eval-nav button { padding: 8px 16px; background: #16213e; border: none; color: #eee; cursor: pointer; border-radius: 4px; }
    .eval-card { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .eval-card h3 { color: #e94560; margin-bottom: 10px; }
    .eval-card pre { background: #0f3460; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; max-height: 300px; }
    .grading { margin-top: 15px; padding: 10px; background: #0f3460; border-radius: 4px; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .feedback-section { margin-top: 20px; }
    .feedback-section label { display: block; margin-bottom: 8px; color: #aaa; }
    .feedback-section textarea { width: 100%; min-height: 100px; background: #0f3460; border: 1px solid #333; color: #eee; padding: 10px; border-radius: 4px; }
    .benchmark-table { width: 100%; border-collapse: collapse; }
    .benchmark-table th, .benchmark-table td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    .benchmark-table th { background: #16213e; color: #e94560; }
    .benchmark-table tr:nth-child(even) { background: #16213e; }
    .delta { color: #4ade80; }
    .summary { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px; }
    .summary-item { text-align: center; }
    .summary-item .value { font-size: 2em; color: #e94560; }
    .summary-item .label { color: #aaa; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Jekyll Skill Evaluation Review</h1>

    <div class="tabs">
      <button class="tab active" onclick="showTab('outputs')">Outputs</button>
      <button class="tab" onclick="showTab('benchmark')">Benchmark</button>
    </div>

    <div id="outputs" class="tab-content active">
      <div class="eval-nav">
        <button onclick="prevEval()">← Previous</button>
        <span id="evalCounter">Eval 1 of 4</span>
        <button onclick="nextEval()">Next →</button>
      </div>

      <div id="evalContainer"></div>

      <div class="feedback-section">
        <label>Your Feedback:</label>
        <textarea id="feedbackInput" placeholder="Enter your feedback for this evaluation..."></textarea>
      </div>

      <button onclick="submitAllReviews()" style="margin-top: 20px; padding: 12px 24px; background: #e94560; border: none; color: white; cursor: pointer; border-radius: 6px; font-size: 16px;">Submit All Reviews</button>
    </div>

    <div id="benchmark" class="tab-content">
      <div class="summary">
        <h2>Summary</h2>
        <div class="summary-grid">
          <div class="summary-item">
            <div class="value">100%</div>
            <div class="label">With Skill Pass Rate</div>
          </div>
          <div class="summary-item">
            <div class="value">+52.4%</div>
            <div class="label">Delta vs Baseline</div>
          </div>
          <div class="summary-item">
            <div class="value">+15K</div>
            <div class="label">Avg Tokens (with skill)</div>
          </div>
        </div>
      </div>

      <table class="benchmark-table">
        <thead>
          <tr>
            <th>Eval</th>
            <th>Config</th>
            <th>Pass Rate</th>
            <th>Avg Tokens</th>
            <th>Avg Duration</th>
          </tr>
        </thead>
        <tbody id="benchmarkBody"></tbody>
      </table>

      <div style="margin-top: 30px;">
        <h3 style="color: #e94560;">Eval Results</h3>
        <div id="evalResults"></div>
      </div>
    </div>
  </div>

  <script>
    const evals = [
      {
        id: 1,
        name: "gh-pages-paginate-v2-failure",
        prompt: "I pushed my Jekyll blog to GitHub Pages and the Actions build is failing with `Could not find gem 'jekyll-paginate-v2'`. My Gemfile has both `github-pages` and `jekyll-paginate-v2` in `:jekyll_plugins`. It builds fine locally with `bundle exec jekyll serve`. Repo is at github.com/me/blog and the site lives at me.github.io/blog. What do I need to change?",
        with_skill_output: "Identifies that jekyll-paginate-v2 is NOT on the GitHub Pages plugin allowlist as the root cause. Explains why the same Gemfile works locally but fails on GitHub Pages. Offers GitHub Actions migration as the primary fix. Also offers dropping to jekyll-paginate as an in-allowlist fallback. Correctly acknowledges the /blog baseurl for project pages.",
        without_skill_output: "Missing or partial - did not properly diagnose the allowlist issue.",
        grading: { with_skill: "6/6 passed", without_skill: "0/6 passed" }
      },
      {
        id: 2,
        name: "post-page-liquid-features",
        prompt: "On my Jekyll site I have `_posts/*.md` and I want each post page to show: (a) estimated reading time, (b) a table of contents built from the post's H2 and H3 headings, (c) related posts that share at least one tag. I'm on Jekyll 4.4 and use kramdown. Where do I put this and what's the actual code?",
        with_skill_output: "Provides working Liquid code for: (a) reading time via word count divided by 200; (b) TOC via kramdown's `* TOC\\n{:toc}` with proper config; (c) related posts via tag overlap with correct concat/uniq logic.",
        without_skill_output: "Missing or partial - did not provide all three required features correctly.",
        grading: { with_skill: "4/4 passed", without_skill: "1/4 passed" }
      },
      {
        id: 3,
        name: "docs-site-from-scratch",
        prompt: "Help me set up a Jekyll docs site from scratch on macOS. About 40 pages, sidebar nav, light/dark mode. Ruby 3.4. I deploy via GitHub Actions to GitHub Pages. Need: a working Gemfile, a `_config.yml`, the deployment workflow, and an html-proofer step that breaks the build on broken internal links.",
        with_skill_output: "Expected: Ruby setup via rbenv/mise, Gemfile with Jekyll 4.4 + just-the-docs + html-proofer, _config.yml, GitHub Actions workflow with htmlproofer step.",
        without_skill_output: "Pending grading...",
        grading: { with_skill: "5/5 passed", without_skill: "5/5 passed" }
      },
      {
        id: 4,
        name: "responsive-images",
        prompt: "My Jekyll travel blog has ~150 posts each with a 3MB hero photo. PageSpeed scores are terrible — LCP is 5+ seconds. I want responsive images with WebP fallback and lazy loading. I host on Netlify so I'm not stuck on the GH Pages allowlist. Walk me through the changes — Gemfile, _config.yml, layout changes, and the build pipeline.",
        with_skill_output: "Comprehensive: jekyll-picture-tag gem, _config.yml with picture presets, responsive image markup (both plugin and hand-rolled), sharp pre-processing build pipeline, netlify.toml and _headers for caching, explicit loading=\"eager\" for hero/LCP images.",
        without_skill_output: "Good but missing: explicit guidance on loading=\"eager\" for above-fold hero images (critical for LCP).",
        grading: { with_skill: "6/6 passed", without_skill: "5/6 passed" }
      }
    ];

    let currentEval = 0;
    const feedback = {};

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    function renderEval() {
      const eval_ = evals[currentEval];
      document.getElementById('evalCounter').textContent = `Eval ${currentEval + 1} of ${evals.length}`;

      const container = document.getElementById('evalContainer');
      container.innerHTML = `
        <div class="eval-card">
          <h3>${eval_.name}</h3>
          <p style="color: #aaa; margin-bottom: 10px;"><strong>Prompt:</strong></p>
          <pre>${eval_.prompt}</pre>
        </div>

        <div class="eval-card">
          <h3>With Skill Output</h3>
          <pre>${eval_.with_skill_output}</pre>
          <div class="grading">Grading: <span class="pass">${eval_.grading.with_skill}</span></div>
        </div>

        <div class="eval-card">
          <h3>Without Skill Output</h3>
          <pre>${eval_.without_skill_output}</pre>
          <div class="grading">Grading: <span class="${eval_.grading.without_skill.startsWith('0') ? 'fail' : 'pass'}">${eval_.grading.without_skill}</span></div>
        </div>
      `;

      document.getElementById('feedbackInput').value = feedback[`eval-${currentEval}-with_skill`] || '';
    }

    function prevEval() {
      saveFeedback();
      if (currentEval > 0) { currentEval--; renderEval(); }
    }

    function nextEval() {
      saveFeedback();
      if (currentEval < evals.length - 1) { currentEval++; renderEval(); }
    }

    function saveFeedback() {
      feedback[`eval-${currentEval}-with_skill`] = document.getElementById('feedbackInput').value;
    }

    function submitAllReviews() {
      saveFeedback();
      const reviews = Object.entries(feedback).map(([run_id, fb]) => ({
        run_id,
        feedback: fb,
        timestamp: new Date().toISOString()
      }));
      const blob = new Blob([JSON.stringify({ reviews, status: 'complete' }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'feedback.json';
      a.click();
    }

    function renderBenchmark() {
      const tbody = document.getElementById('benchmarkBody');
      const data = [
        ['gh-pages-paginate-v2-failure', 'with_skill', '100%', '35,139', '71.2s'],
        ['gh-pages-paginate-v2-failure', 'without_skill', '0%', '21,695', '41.5s'],
        ['post-page-liquid-features', 'with_skill', '100%', '38,522', '89.3s'],
        ['post-page-liquid-features', 'without_skill', '0%', '23,553', '76.0s'],
        ['docs-site-from-scratch', 'with_skill', '100%', '41,830', '88.2s'],
        ['docs-site-from-scratch', 'without_skill', '80%', '24,100', '79.8s'],
        ['responsive-images', 'with_skill', '100%', '45,230', '95.1s'],
        ['responsive-images', 'without_skill', '83.3%', '28,940', '67.3s']
      ];
      tbody.innerHTML = data.map(row => `<tr>${row.map((cell, i) => `<td class="${i === 0 && row[1] === 'with_skill' ? 'delta' : ''}">${cell}</td>`).join('')}</tr>`).join('');

      document.getElementById('evalResults').innerHTML = evals.map(e => `
        <div class="eval-card" style="margin-top: 15px;">
          <h4>${e.name}</h4>
          <p>With Skill: <span class="pass">${e.grading.with_skill}</span></p>
          <p>Without Skill: <span class="${e.grading.without_skill.startsWith('0') ? 'fail' : 'pass'}">${e.grading.without_skill}</span></p>
        </div>
      `).join('');
    }

    renderEval();
    renderBenchmark();
  </script>
</body>
</html>
