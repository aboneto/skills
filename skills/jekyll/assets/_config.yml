# ════════════════════════════════════════════════════════════════════
# Site identity — change these for every site
# ════════════════════════════════════════════════════════════════════
title: "My Site"
description: "A short description used by jekyll-seo-tag as the default meta description."
url: "https://example.com"          # production URL, no trailing slash
baseurl: ""                         # "" if served at root; "/blog" if at example.com/blog
author:
  name: "Site Author"
  email: "you@example.com"

# ════════════════════════════════════════════════════════════════════
# Build behavior
# ════════════════════════════════════════════════════════════════════
markdown: kramdown
highlighter: rouge
encoding: utf-8
timezone: Europe/Madrid             # affects how dates without explicit offsets are parsed

# URL shape for posts. Switch to /:year/:month/:slug/ for a cleaner look.
permalink: /:year/:month/:day/:title/

# Catch typos like {{ pag.title }} instead of {{ page.title }}.
# Turn strict_variables on only after the site builds cleanly.
liquid:
  error_mode: strict
  strict_filters: true
  strict_variables: false

# ════════════════════════════════════════════════════════════════════
# What to include / exclude
# ════════════════════════════════════════════════════════════════════
include:
  - .htaccess
  - _redirects                      # for Netlify
  - _headers                        # for Netlify

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github
  - .vscode
  - scripts

# ════════════════════════════════════════════════════════════════════
# Plugins — must also be in Gemfile under :jekyll_plugins
# ════════════════════════════════════════════════════════════════════
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-paginate-v2
  - jekyll-include-cache

# ════════════════════════════════════════════════════════════════════
# Plugin configuration
# ════════════════════════════════════════════════════════════════════

# jekyll-feed
feed:
  posts_limit: 20
  excerpt_only: true

# jekyll-seo-tag (and Open Graph / Twitter Card metadata)
logo: /assets/logo.png
social:
  name: Site Name
  links:
    - https://github.com/yourhandle
    # - https://twitter.com/yourhandle
    # - https://www.linkedin.com/in/yourhandle/

twitter:
  username: yourhandle
  card: summary_large_image

# jekyll-paginate-v2
pagination:
  enabled: true
  per_page: 10
  permalink: '/page/:num/'
  title: ':title — Page :num'
  limit: 0                          # 0 = no limit
  sort_field: 'date'
  sort_reverse: true

# ════════════════════════════════════════════════════════════════════
# Collections (uncomment and edit if you need them)
# ════════════════════════════════════════════════════════════════════
# collections:
#   projects:
#     output: true
#     permalink: /projects/:path/
#   docs:
#     output: true
#     permalink: /docs/:path/

# ════════════════════════════════════════════════════════════════════
# Front-matter defaults — stop pasting `layout: post` in every file
# ════════════════════════════════════════════════════════════════════
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      comments: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  # - scope:
  #     path: ""
  #     type: "projects"
  #   values:
  #     layout: project

# ════════════════════════════════════════════════════════════════════
# Sass
# ════════════════════════════════════════════════════════════════════
sass:
  style: compressed                 # use "expanded" for dev if you want readable CSS
  sass_dir: _sass

# ════════════════════════════════════════════════════════════════════
# Kramdown (Markdown engine) options
# ════════════════════════════════════════════════════════════════════
kramdown:
  input: GFM                        # GitHub-flavored Markdown
  hard_wrap: false
  auto_ids: true                    # generate id attributes on headings (for anchor links)
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ════════════════════════════════════════════════════════════════════
# Production-only values
# Reference these in templates with {% if jekyll.environment == "production" %}
# ════════════════════════════════════════════════════════════════════
# google_analytics: G-XXXXXXXXXX
# disqus:
#   shortname: your-shortname
